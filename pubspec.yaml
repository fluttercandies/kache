name: kache_workspace
publish_to: none

environment:
  sdk: ^3.9.0

workspace:
  - packages/kache
  - packages/kache_flutter
  - packages/kache_hive_ce
  - packages/kache_riverpod
  - packages/kache_bloc
  - packages/kache_provider
  - examples/kache_flutter_example
  - examples/kache_riverpod_example
  - examples/kache_bloc_example
  - examples/kache_provider_example
  - tool/contract_tests

dev_dependencies:
  lints: ^6.0.0
  melos: 7.8.0
  pub_semver: 2.2.0
  test: 1.30.0
  yaml: ^3.1.3

melos:
  scripts:
    test: 'melos exec --dir-exists=test -- "flutter test"'
    test:integration: 'melos exec --dir-exists=integration_test -- "flutter test integration_test"'
    test:persistence-contracts: 'melos exec --scope=kache_contract_tests -- flutter test test/persistence_contract_test.dart'
    test:hive: 'melos exec --scope=kache_hive_ce -- dart test'
    test:riverpod: 'melos exec --scope=kache_riverpod -- dart test'
    test:bloc: 'melos exec --scope=kache_bloc -- dart test'
    test:core-failure-injection: 'melos exec --scope=kache -- dart test test/failure_injection_test.dart'
    test:core-lifecycle: 'melos exec --scope=kache -- dart test test/lifecycle_stress_test.dart'
    test:adapter-contracts: 'melos exec --scope=kache_contract_tests -- flutter test test/adapter_contract_test.dart'
    test:examples: 'melos exec --scope="*_example" --dir-exists=test -- flutter test'
    test:failure-injection: 'melos run test:core-failure-injection && melos run test:hive && melos run test:adapter-contracts'
    test:lifecycle: 'melos run test:core-lifecycle && melos run test:adapter-contracts && melos run test:examples'
    analyze:examples: 'melos exec --scope="*_example" -- flutter analyze'
    docs: 'melos exec --no-private -- dart doc'
    test:readme: 'dart test test/readme_examples_test.dart'
    api-check: 'dart test test/api_compatibility_test.dart'
    compatibility-check: 'dart test test/version_compatibility_test.dart'
    benchmark: 'melos exec --scope=kache -- dart run benchmark/kache_benchmark.dart'
    dependency-boundaries: 'dart run tool/check_dependency_boundaries.dart'
    verify:script-manifest: 'dart run tool/check_melos_scripts.dart'
    source-marker-check: 'dart run tool/check_source_markers.dart'
    publish-dry-run: 'melos exec --no-private -- "dart pub publish --dry-run"'
