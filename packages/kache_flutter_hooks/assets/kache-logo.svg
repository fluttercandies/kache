<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     role="img"
     aria-labelledby="kache-logo-title kache-logo-description">
  <title id="kache-logo-title">Kache logo</title>
  <desc id="kache-logo-description">A glass and metal pair of cache cartridges with a raised K and revalidation dial, representing stale-while-revalidate.</desc>
  <defs>
    <linearGradient id="stale-shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF3BD"/>
      <stop offset="0.34" stop-color="#F5C45A"/>
      <stop offset="0.72" stop-color="#C57B24"/>
      <stop offset="1" stop-color="#754214"/>
    </linearGradient>
    <linearGradient id="stale-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B67524"/>
      <stop offset="1" stop-color="#5F3614"/>
    </linearGradient>
    <linearGradient id="stale-glass" x1="0" y1="0" x2="0.82" y2="1">
      <stop offset="0" stop-color="#FFFDF0" stop-opacity="0.92"/>
      <stop offset="0.38" stop-color="#F9D67A" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#A9641D" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="fresh-shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C9FFF6"/>
      <stop offset="0.28" stop-color="#43DCC9"/>
      <stop offset="0.66" stop-color="#119B92"/>
      <stop offset="1" stop-color="#075553"/>
    </linearGradient>
    <linearGradient id="fresh-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C7772"/>
      <stop offset="1" stop-color="#063B3B"/>
    </linearGradient>
    <linearGradient id="fresh-glass" x1="0" y1="0" x2="0.86" y2="1">
      <stop offset="0" stop-color="#EEFFFC" stop-opacity="0.94"/>
      <stop offset="0.44" stop-color="#5DE1D2" stop-opacity="0.76"/>
      <stop offset="1" stop-color="#087D79" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0.86" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.22" stop-color="#B9C9C9"/>
      <stop offset="0.48" stop-color="#5C7375"/>
      <stop offset="0.68" stop-color="#E4EEEE"/>
      <stop offset="1" stop-color="#243A3D"/>
    </linearGradient>
    <radialGradient id="dial-metal" cx="0.35" cy="0.25" r="0.8">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.38" stop-color="#C7D5D4"/>
      <stop offset="0.72" stop-color="#677B7C"/>
      <stop offset="1" stop-color="#263B3D"/>
    </radialGradient>
    <radialGradient id="screw-metal" cx="0.34" cy="0.26" r="0.76">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#9DB0B0"/>
      <stop offset="1" stop-color="#304547"/>
    </radialGradient>
    <radialGradient id="ground-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#07191B" stop-opacity="0.56"/>
      <stop offset="1" stop-color="#07191B" stop-opacity="0"/>
    </radialGradient>
    <filter id="cache-shadow" x="-25%" y="-25%" width="150%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#061719" flood-opacity="0.46"/>
    </filter>
    <filter id="raised-metal" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="2.5" flood-color="#06282A" flood-opacity="0.62"/>
    </filter>
  </defs>

  <ellipse cx="128" cy="228" rx="102" ry="19" fill="url(#ground-shadow)"/>

  <g filter="url(#cache-shadow)">
    <rect x="74" y="39" width="152" height="130" rx="25" fill="url(#stale-side)" stroke="#382711" stroke-width="5"/>
    <rect x="62" y="27" width="152" height="130" rx="25" fill="url(#stale-shell)" stroke="#3B2A13" stroke-width="5"/>
    <path d="M78 34h120c5 0 9 3 10 8" fill="none" stroke="#FFF9DB" stroke-width="4" stroke-linecap="round" opacity="0.86"/>
    <rect x="78" y="45" width="120" height="88" rx="16" fill="url(#stale-glass)" stroke="#5B3A17" stroke-width="4"/>
    <path d="M88 53h83c-25 8-50 22-72 45H86V60c0-4 1-6 2-7z" fill="#FFFFFF" opacity="0.28"/>
    <path d="M81 139h112" fill="none" stroke="#FFF0B1" stroke-width="4" stroke-linecap="round" opacity="0.62"/>

    <g filter="url(#raised-metal)">
      <circle cx="181" cy="67" r="25" fill="#D49A35" stroke="#3B2A13" stroke-width="5"/>
      <circle cx="181" cy="67" r="18" fill="url(#dial-metal)" stroke="#6D4D24" stroke-width="3"/>
      <path d="M172 60a12 12 0 1 1-1 15" fill="none" stroke="#17383A" stroke-width="5" stroke-linecap="round"/>
      <path d="M166 72l5 7 7-5" fill="none" stroke="#17383A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M172 52c5-4 12-3 16 0" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.76"/>
    </g>

    <rect x="38" y="84" width="176" height="150" rx="29" fill="url(#fresh-side)" stroke="#0A2B2E" stroke-width="5"/>
    <rect x="24" y="70" width="176" height="150" rx="29" fill="url(#fresh-shell)" stroke="#0A2B2E" stroke-width="5"/>
    <path d="M45 78h132c7 0 12 4 14 10" fill="none" stroke="#E9FFFB" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <rect x="42" y="91" width="140" height="110" rx="19" fill="url(#fresh-glass)" stroke="#0B5554" stroke-width="4"/>
    <path d="M53 99h101c-31 10-59 28-84 56H50v-47c0-5 1-8 3-9z" fill="#FFFFFF" opacity="0.31"/>
    <path d="M44 207h132" fill="none" stroke="#76E9DC" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

    <g fill="url(#screw-metal)" stroke="#17383A" stroke-width="2">
      <circle cx="45" cy="91" r="7"/>
      <circle cx="179" cy="91" r="7"/>
      <circle cx="45" cy="199" r="7"/>
      <circle cx="179" cy="199" r="7"/>
    </g>
    <g stroke="#31494B" stroke-width="2" stroke-linecap="round">
      <path d="M42 91h6M176 91h6M42 199h6M176 199h6"/>
    </g>

    <g filter="url(#raised-metal)">
      <path d="M62 108h27v32l34-32h36l-45 43 48 43h-39l-34-31v31H62z" fill="url(#metal)" stroke="#17383A" stroke-width="4" stroke-linejoin="round"/>
      <path d="M68 114h16v39l42-39h17" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.67"/>
    </g>
  </g>
</svg>
